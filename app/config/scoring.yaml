metadata:
  version: '2.0'
  created: '2025-06-15'
  updated: '2026-03-05'
  author: Climate Risk Team
  notes: Thresholds based on International standards and expert judgement
  conventions:
    scoring_system:
      5_point: 0-5 scale with 0=no risk, 5=extreme risk
      10_point: 0-10 scale with 0=no risk, 10=extreme risk
